apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-api
  labels: { app: sample-api }
spec:
  replicas: 2
  selector:
    matchLabels: { app: sample-api }
  template:
    metadata:
      labels: { app: sample-api }
    spec:
      containers:
        - name: sample-api
          image: ghcr.io/your-username/sample-api:latest
          ports:
            - containerPort: 8080
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
